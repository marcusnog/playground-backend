services:
  postgres:
    image: postgres:16-alpine
    container_name: playground-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-playground}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-playground}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - playground-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playground-backend-prod
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - playground-network

volumes:
  postgres_data:

networks:
  playground-network:
    driver: bridge
