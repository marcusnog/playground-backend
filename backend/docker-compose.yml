services:
  postgres:
    image: postgres:17-alpine
    container_name: playground-postgres
    environment:
      - POSTGRES_USER=playground
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=playground
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playground"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: playground-backend
    ports:
      - "3001:3001"
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./prisma:/app/prisma
      # Persist database
      - ./data:/app/data
      # Exclude node_modules from volume mount
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://playground:${POSTGRES_PASSWORD}@postgres:5432/playground?schema=public
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        echo '🔧 Gerando Prisma Client...' &&
        npx prisma generate &&
        echo '🔧 Configurando banco de dados...' &&
        echo '⏳ Aguardando PostgreSQL estar pronto...' &&
        sleep 5 &&
        if [ -d prisma/migrations ] && [ \"\$(ls -A prisma/migrations 2>/dev/null)\" ]; then
          echo '📦 Aplicando migrações existentes...' &&
          npx prisma migrate deploy || true
        else
          echo '📦 Sincronizando schema com banco de dados...' &&
          npx prisma db push --accept-data-loss || true
        fi &&
        echo '🌱 Executando seed (criando usuário master)...' &&
        npm run prisma:seed || echo '⚠️  Seed falhou ou usuário master já existe' &&
        echo '✅ Banco de dados configurado!' &&
        echo '🚀 Iniciando servidor...' &&
        npm run dev
      "
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
